name: Google Ads keyword ideas

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-keyword-ideas:
    runs-on: ubuntu-latest
    env:
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      GOOGLE_ADS_LANGUAGE_ID: ${{ vars.GOOGLE_ADS_LANGUAGE_ID }}
      GOOGLE_ADS_GEO_TARGET_CONSTANTS: ${{ vars.GOOGLE_ADS_GEO_TARGET_CONSTANTS }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Google Ads credentials
        id: config
        run: |
          missing=()

          [ -n "$GOOGLE_ADS_DEVELOPER_TOKEN" ] || missing+=("GOOGLE_ADS_DEVELOPER_TOKEN")
          [ -n "$GOOGLE_ADS_CLIENT_ID" ] || missing+=("GOOGLE_ADS_CLIENT_ID")
          [ -n "$GOOGLE_ADS_CLIENT_SECRET" ] || missing+=("GOOGLE_ADS_CLIENT_SECRET")
          [ -n "$GOOGLE_ADS_REFRESH_TOKEN" ] || missing+=("GOOGLE_ADS_REFRESH_TOKEN")
          [ -n "$GOOGLE_ADS_CUSTOMER_ID" ] || missing+=("GOOGLE_ADS_CUSTOMER_ID")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Google Ads keyword ideas skipped::Missing secrets: ${missing[*]}."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Generate keyword ideas
        if: steps.config.outputs.enabled == 'true'
        run: npm run ads:keywords

      - name: Create pull request
        if: steps.config.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/google-ads-keywords
          delete-branch: true
          title: "Update Google Ads keyword ideas"
          commit-message: "Update Google Ads keyword ideas"
          body: |
            Automated Google Ads Keyword Planner report.

            Review:
            - High-volume restaurant/local SEO keywords.
            - Keywords with commercial intent from CPC ranges.
            - Editorial recommendations before updating the WordPress draft queue.
