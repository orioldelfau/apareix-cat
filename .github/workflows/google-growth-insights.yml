name: Google growth insights

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  analyze-google-data:
    runs-on: ubuntu-latest
    env:
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check Google credentials
        id: config
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ] && { [ -z "$GOOGLE_OAUTH_CLIENT_ID" ] || [ -z "$GOOGLE_OAUTH_CLIENT_SECRET" ] || [ -z "$GOOGLE_OAUTH_REFRESH_TOKEN" ]; }; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Google growth insights skipped::Missing Google credentials. Add GOOGLE_SERVICE_ACCOUNT_JSON, or the OAuth trio GOOGLE_OAUTH_CLIENT_ID, GOOGLE_OAUTH_CLIENT_SECRET and GOOGLE_OAUTH_REFRESH_TOKEN."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Generate Google growth insights
        if: steps.config.outputs.enabled == 'true'
        run: npm run google:insights

      - name: Create pull request
        if: steps.config.outputs.enabled == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/google-growth-insights
          delete-branch: true
          title: "Update Google growth insights"
          commit-message: "Update Google growth insights"
          body: |
            Automated Search Console and GA4 insight report.

            Review:
            - Top queries with high impressions and low CTR.
            - Pages around positions 8-20.
            - Recommended content updates before changing the editorial queue.
