name: WordPress landing

on:
  workflow_dispatch:

jobs:
  apply-landing:
    runs-on: ubuntu-latest
    env:
      WP_SITE_URL: https://apareix.cat
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      WP_PAGE_ID: ${{ vars.WP_PAGE_ID || '12' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check WordPress credentials
        run: |
          if [ -z "$WP_USER" ] || [ -z "$WP_APP_PASSWORD" ]; then
            echo "::error title=Missing WordPress credentials::Add WP_USER and WP_APP_PASSWORD repository secrets."
            exit 1
          fi

      - name: Apply landing
        run: npm run wp:apply-landing
