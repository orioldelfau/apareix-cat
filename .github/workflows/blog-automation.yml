name: Blog automation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-blog-post:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check OpenAI configuration
        id: config
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Blog automation skipped::Missing OPENAI_API_KEY secret. Add it in GitHub repository secrets to enable scheduled blog generation."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Generate blog post
        if: steps.config.outputs.enabled == 'true'
        run: npm run generate:blog

      - name: Install dependencies
        if: steps.config.outputs.enabled == 'true'
        run: npm ci

      - name: Build public site
        if: steps.config.outputs.enabled == 'true'
        run: npm run build

      - name: Create pull request
        id: create_pr
        if: steps.config.outputs.enabled == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          branch: automation/blog-post
          delete-branch: true
          title: "Add automated blog post"
          commit-message: "Add automated blog post"
          body: |
            Automated Apareix blog draft.

            Review checklist:
            - The article is useful for restaurant owners.
            - It does not promise guaranteed Google Maps positions.
            - The CTA points to Apareix Maps at 50 EUR/month.
            - The tone sounds specific, not generic.

      - name: Report pull request fallback
        if: steps.config.outputs.enabled == 'true' && steps.create_pr.outcome == 'failure'
        run: |
          echo "::warning title=Pull request not created::The blog post was generated and pushed to automation/blog-post, but this repository does not allow GitHub Actions to create pull requests. Enable Settings > Actions > General > Allow GitHub Actions to create and approve pull requests, or open https://github.com/orioldelfau/apareix-cat/pull/new/automation/blog-post manually."
