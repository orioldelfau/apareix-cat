name: WordPress editorial drafts

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

permissions:
  contents: read

jobs:
  create-wordpress-draft:
    runs-on: ubuntu-latest
    env:
      WP_URL: https://apareix.cat
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check WordPress credentials
        id: config
        run: |
          if [ -z "$WP_USER" ] || [ -z "$WP_APP_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=WordPress editorial draft skipped::Missing WP_USER or WP_APP_PASSWORD secrets. Add both to enable daily WordPress draft creation."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Create WordPress editorial draft
        if: steps.config.outputs.enabled == 'true'
        run: npm run wp:draft
