name: WordPress editorial publishing

on:
  workflow_dispatch:
    inputs:
      queue_path:
        description: "Editorial queue JSON path"
        required: false
        default: "data/seo-geo-drafts.json"
      article_slug:
        description: "Optional article slug to draft"
        required: false
      trash_slugs:
        description: "Optional space-separated old post slugs to move to trash"
        required: false
      skip_create:
        description: "Set true to only trash old posts"
        required: false
        default: "false"
      update_existing:
        description: "Set true to update an existing post with the same slug"
        required: false
        default: "false"
      post_status:
        description: "WordPress status for newly created posts"
        required: false
        default: "publish"
      publish_existing:
        description: "Set true to publish existing Apareix editorial drafts"
        required: false
        default: "false"
      generate_ai:
        description: "Set true to generate a fresh SEO/GEO topic before drafting"
        required: false
        default: "true"
  schedule:
    - cron: "15 7 * * *"

permissions:
  contents: read

jobs:
  create-wordpress-draft:
    runs-on: ubuntu-latest
    env:
      WP_URL: https://apareix.cat
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_FROM: ${{ vars.RESEND_FROM || 'Apareix <onboarding@resend.dev>' }}
      APAREIX_OWNER_EMAIL: ${{ vars.APAREIX_OWNER_EMAIL || 'hola@orioldelfau.com' }}
      GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
      GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
      GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
      SEARCH_CONSOLE_SITE_URL: ${{ vars.SEARCH_CONSOLE_SITE_URL || 'https://apareix.cat/' }}
      SEARCH_CONSOLE_SITEMAP_URL: ${{ vars.SEARCH_CONSOLE_SITEMAP_URL || 'https://apareix.cat/sitemap_index.xml' }}
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
      EDITORIAL_QUEUE_PATH: ${{ github.event.inputs.queue_path || 'data/seo-geo-drafts.json' }}
      ARTICLE_SLUG: ${{ github.event.inputs.article_slug }}
      TRASH_SLUGS: ${{ github.event.inputs.trash_slugs }}
      SKIP_CREATE: ${{ github.event.inputs.skip_create || 'false' }}
      UPDATE_EXISTING: ${{ github.event.inputs.update_existing || 'false' }}
      WP_POST_STATUS: ${{ github.event.inputs.post_status || 'publish' }}
      PUBLISH_EXISTING: ${{ github.event.inputs.publish_existing || 'false' }}
      GENERATE_AI: ${{ github.event.inputs.generate_ai || 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check WordPress credentials
        id: config
        run: |
          if [ -z "$WP_USER" ] || [ -z "$WP_APP_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=WordPress editorial draft skipped::Missing WP_USER or WP_APP_PASSWORD secrets. Add both to enable daily WordPress draft creation."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Trash old WordPress posts
        if: steps.config.outputs.enabled == 'true' && env.TRASH_SLUGS != ''
        run: npm run wp:trash-posts -- $TRASH_SLUGS

      - name: Publish existing WordPress editorial drafts
        if: steps.config.outputs.enabled == 'true' && env.PUBLISH_EXISTING == 'true'
        run: npm run wp:publish-editorial-drafts

      - name: Generate daily SEO GEO topic
        if: steps.config.outputs.enabled == 'true' && env.SKIP_CREATE != 'true' && env.ARTICLE_SLUG == '' && env.GENERATE_AI == 'true'
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::notice title=Daily AI draft skipped::Missing OPENAI_API_KEY secret. Falling back to configured editorial queue."
            exit 0
          fi

          npm run wp:generate-topic
          echo "EDITORIAL_QUEUE_PATH=reports/generated-wp-topic.json" >> "$GITHUB_ENV"

      - name: Create WordPress editorial post
        if: steps.config.outputs.enabled == 'true' && env.SKIP_CREATE != 'true'
        run: npm run wp:draft -- --status "$WP_POST_STATUS" --notify-publication

      - name: Submit sitemap to Google Search Console
        if: steps.config.outputs.enabled == 'true'
        run: npm run gsc:submit-sitemap
