name: WordPress editorial drafts

on:
  workflow_dispatch:
    inputs:
      queue_path:
        description: "Editorial queue JSON path"
        required: false
        default: "data/seo-geo-drafts.json"
      article_slug:
        description: "Optional article slug to draft"
        required: false
      trash_slugs:
        description: "Optional space-separated old post slugs to move to trash"
        required: false
      skip_create:
        description: "Set true to only trash old posts"
        required: false
        default: "false"
      update_existing:
        description: "Set true to update an existing post with the same slug"
        required: false
        default: "false"
  schedule:
    - cron: "15 7 * * *"

permissions:
  contents: read

jobs:
  create-wordpress-draft:
    runs-on: ubuntu-latest
    env:
      WP_URL: https://apareix.cat
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      EDITORIAL_QUEUE_PATH: ${{ github.event.inputs.queue_path || 'data/seo-geo-drafts.json' }}
      ARTICLE_SLUG: ${{ github.event.inputs.article_slug }}
      TRASH_SLUGS: ${{ github.event.inputs.trash_slugs }}
      SKIP_CREATE: ${{ github.event.inputs.skip_create || 'false' }}
      UPDATE_EXISTING: ${{ github.event.inputs.update_existing || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Check WordPress credentials
        id: config
        run: |
          if [ -z "$WP_USER" ] || [ -z "$WP_APP_PASSWORD" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=WordPress editorial draft skipped::Missing WP_USER or WP_APP_PASSWORD secrets. Add both to enable daily WordPress draft creation."
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Trash old WordPress posts
        if: steps.config.outputs.enabled == 'true' && env.TRASH_SLUGS != ''
        run: npm run wp:trash-posts -- $TRASH_SLUGS

      - name: Create WordPress editorial draft
        if: steps.config.outputs.enabled == 'true' && env.SKIP_CREATE != 'true'
        run: npm run wp:draft
