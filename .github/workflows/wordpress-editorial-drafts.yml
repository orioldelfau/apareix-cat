name: WordPress editorial drafts

on:
  workflow_dispatch:
  schedule:
    - cron: "15 7 * * *"

permissions:
  contents: read

jobs:
  create-wordpress-draft:
    runs-on: ubuntu-latest
    env:
      WP_URL: https://apareix.cat
      WP_USER: ${{ secrets.WP_USER }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate WordPress credentials
        run: |
          test -n "$WP_USER"
          test -n "$WP_APP_PASSWORD"

      - name: Create WordPress editorial draft
        run: npm run wp:draft
